<!DOCTYPE html>
<html lang="es">
<head>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LineApp — Tu Festival</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Anton&family=Syne:wght@300;400;700;800&family=DM+Mono:ital@0;1&display=swap" rel="stylesheet">
<style>
@font-face {
  font-family: 'Recollect';
  src: url('/Recollect-BWGjB.otf') format('opentype');
  font-weight: normal;
  font-style: normal;
}

* { margin:0; padding:0; box-sizing:border-box; }
body { min-height:100vh; background:#0e0e0e; color:#fff; font-family:'Syne',sans-serif; }

#loading {
  position:fixed; inset:0; display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  background:#583EFF; z-index:100; gap:0;
  overflow:hidden;
}

/* Blobs */
#loading::before, #loading::after {
  content:''; position:absolute; border-radius:50%;
  filter:blur(80px); pointer-events:none;
}
#loading::before {
  width:400px; height:400px; background:#8B6FFF;
  opacity:.4; top:-100px; right:-80px;
  animation:ldrift 7s ease-in-out infinite alternate;
}
#loading::after {
  width:350px; height:350px; background:#FF3E8A;
  opacity:.25; bottom:-80px; left:-60px;
  animation:ldrift 9s ease-in-out infinite alternate-reverse;
}
@keyframes ldrift { to { transform:translate(20px,15px) scale(1.07); } }

/* Logo */
.l-logo {
  opacity:0; transform:translateY(16px);
  animation:lFadeUp .7s .1s forwards;
  margin-bottom:48px; z-index:1;
}
.l-logo svg { height:44px; width:auto; }

/* Vinyl record */
.l-vinyl {
  width:72px; height:72px; position:relative;
  margin-bottom:32px; z-index:1;
  animation:lFadeUp .7s .25s forwards; opacity:0;
}
.l-vinyl-outer {
  width:72px; height:72px; border-radius:50%;
  background:conic-gradient(
    #FFF9DA08 0deg, #FFF9DA18 30deg, #FFF9DA08 60deg,
    #FFF9DA18 90deg, #FFF9DA08 120deg, #FFF9DA18 150deg,
    #FFF9DA08 180deg, #FFF9DA18 210deg, #FFF9DA08 240deg,
    #FFF9DA18 270deg, #FFF9DA08 300deg, #FFF9DA18 330deg, #FFF9DA08 360deg
  );
  border: 1.5px solid rgba(255,249,218,.15);
  animation:spin 2.5s linear infinite;
  position:absolute; inset:0;
}
.l-vinyl-mid {
  position:absolute; width:28px; height:28px;
  border-radius:50%; background:#583EFF;
  border:1.5px solid rgba(255,249,218,.2);
  top:50%; left:50%; transform:translate(-50%,-50%);
}
.l-vinyl-dot {
  position:absolute; width:6px; height:6px;
  border-radius:50%; background:rgba(255,249,218,.5);
  top:50%; left:50%; transform:translate(-50%,-50%);
}
@keyframes spin { to { transform:rotate(360deg); } }

/* Status text */
.l-status {
  font-family:'Syne',sans-serif; font-weight:300;
  font-size:14px; color:rgba(255,249,218,.55);
  letter-spacing:.5px; z-index:1;
  opacity:0; animation:lFadeUp .7s .4s forwards;
  min-height:22px; text-align:center;
  transition:opacity .3s;
}

/* Dots */
.l-dots { display:inline-flex; gap:4px; margin-left:2px; vertical-align:middle; }
.l-dots span {
  width:4px; height:4px; border-radius:50%;
  background:rgba(255,249,218,.4);
  animation:ldot .9s ease-in-out infinite;
  display:inline-block;
}
.l-dots span:nth-child(2) { animation-delay:.15s; }
.l-dots span:nth-child(3) { animation-delay:.3s; }
@keyframes ldot {
  0%,80%,100% { transform:scale(.7); opacity:.3; }
  40%          { transform:scale(1.1); opacity:1; }
}

.l-ad {
  margin-top:36px; z-index:1;
  opacity:0; animation:lFadeUp .7s .8s forwards;
  display:flex; flex-direction:column; align-items:center; gap:8px;
}
.l-ad-label {
  font-family:'Syne',sans-serif; font-size:9px;
  letter-spacing:3px; text-transform:uppercase;
  color:rgba(255,249,218,.2);
}

@keyframes lFadeUp {
  from { opacity:0; transform:translateY(14px); }
  to   { opacity:1; transform:translateY(0); }
}

/* ── Design tokens ── */
:root {
  --cream: #FFF9DA;
  --purple: #583EFF;
  --glass-bg: rgba(255,249,218,.10);
  --glass-border: rgba(255,249,218,.18);
}

/* ── Layout ── */
html { height:100%; }
body { min-height:100%; background:var(--purple); color:var(--cream); font-family:'Syne',sans-serif; overflow-y:auto; }

/* ── Background — exact same as landing ── */
.blob {
  position:fixed; border-radius:50%;
  filter:blur(90px); pointer-events:none; z-index:0;
  animation:drift 8s ease-in-out infinite alternate;
}
.blob1 { width:500px; height:500px; background:#7B5FFF; opacity:.4; top:-120px; right:-80px; }
.blob2 { width:380px; height:380px; background:#FF3E8A; opacity:.3; bottom:-80px; left:-60px; animation-delay:-3s; }
.blob3 { width:280px; height:280px; background:#3EFFCB; opacity:.2; top:45%; left:62%; animation-delay:-5s; }
@keyframes drift { to { transform:translate(25px,18px) scale(1.06); } }
.ring {
  position:fixed; width:600px; height:600px;
  border:1px solid rgba(255,249,218,.05); border-radius:50%;
  top:50%; left:50%; transform:translate(-50%,-50%);
  animation:rspin 30s linear infinite; pointer-events:none; z-index:0;
}
.ring2 { width:900px; height:900px; border-color:rgba(255,249,218,.025); animation-duration:50s; animation-direction:reverse; }
@keyframes rspin { to { transform:translate(-50%,-50%) rotate(360deg); } }

/* Noise texture */
body::before {
  content:''; position:fixed; inset:0; pointer-events:none; z-index:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.05'/%3E%3C/svg%3E");
  opacity:.3;
}

#app {
  display:none;
  flex-direction:column;
  min-height:100vh;
  position:relative; z-index:1;
}

/* ── Topbar — fixed height ── */
.topbar {
  flex-shrink:0;
  padding:0 32px; height:56px;
  display:flex; align-items:center; justify-content:space-between;
  border-bottom:1px solid rgba(255,249,218,.08);
  background:rgba(88,62,255,.85); backdrop-filter:blur(16px);
  z-index:50;
}
.topbar-logo svg { height:30px; width:auto; }
.topbar-right { display:flex; align-items:center; gap:12px; }
.chip {
  display:flex; align-items:center; gap:8px;
  background:var(--glass-bg); border:1px solid var(--glass-border);
  border-radius:100px; padding:4px 14px 4px 4px;
}
.chip img { width:26px; height:26px; border-radius:50%; object-fit:cover; }
.chip-name { font-size:12px; font-weight:700; color:var(--cream); }
.btn-logout { display:flex; align-items:center; gap:6px;
  background:none; border:none; padding:4px 0;
  color:var(--cream); font-family:'DM Mono',monospace;
  font-size:11px; letter-spacing:2px; text-transform:uppercase;
  cursor:pointer; transition:color .2s;
}
.btn-logout:hover { color:#fff; }

.layout {
  flex:1;
  display:flex; gap:28px; padding:24px 32px 130px;
  justify-content:center; align-items:flex-start;
  position:relative; z-index:1;
}

/* ── Left column: flyer + buttons ── */
.flyer-wrap {
  flex-shrink:0;
  display:flex; flex-direction:column; align-items:center; gap:14px;
}

/* Canvas fills available height, width is auto (preserves aspect ratio) */
#flyerCanvas {
  display:block !important;
  width:348px !important;
  height:620px !important;
  border-radius:12px !important;
  box-shadow:0 24px 80px rgba(0,0,0,.5);
}

/* Buttons: fixed 48px, same width as canvas */
.flyer-btns {
  width:348px;
  display:flex; gap:10px;
}
.flyer-btn {
  flex:1; display:flex; align-items:center; justify-content:center; gap:8px;
  height:48px; border-radius:100px;
  font-family:'Syne',sans-serif; font-size:14px; font-weight:700;
  letter-spacing:.3px; cursor:pointer; transition:all .2s;
  white-space:nowrap; position:relative; overflow:hidden;
}
.flyer-btn-outline {
  background:transparent; border:2px solid #fff; color:#fff;
}
.flyer-btn-outline:hover { background:rgba(255,249,218,.1); transform:translateY(-1px); }
.flyer-btn-solid {
  background:#fff; border:2px solid #fff; color:var(--purple);
}
.flyer-btn-solid::after {
  content:''; position:absolute; top:-50%; left:-75%; width:50%; height:200%;
  background:linear-gradient(120deg,transparent,rgba(255,255,255,.45),transparent);
  transform:skewX(-20deg); transition:left .5s ease;
}
.flyer-btn-solid:hover { transform:translateY(-1px); }
.flyer-btn-solid:hover::after { left:140%; }

/* ── Right column ── */
.right-panel {
  flex:1; min-width:280px; max-width:460px;
  display:flex; flex-direction:column; gap:12px;
  height:682px;
}


/* ── Tabs ── */

.insights-card { flex:1; display:flex; flex-direction:column; min-height:0; }
.concert-card  { flex:1; display:flex; flex-direction:column; min-height:0; }
.time-pills {
  display:flex; gap:4px; background:#fff;
  border-radius:100px; padding:4px; flex-shrink:0; height:48px;
}
.tpill {
  flex:1; display:flex; align-items:center; justify-content:center;
  border-radius:100px; border:none; background:none;
  color:rgba(88,62,255,.45); font-family:'Syne',sans-serif;
  font-size:13px; font-weight:700; letter-spacing:.3px;
  cursor:pointer; transition:all .2s; white-space:nowrap;
}
.tpill.active { background:var(--purple); color:var(--cream); }

/* ── Cards ── */
.card {
  background:#fff; border:none;
  border-radius:14px; padding:22px;
}
.card-fill {
  flex:1; display:flex; flex-direction:column; min-height:0; overflow:hidden;
}
.card-fill .city-row,
.card-fill #concertDiv { flex-shrink:0; }
.card-fill #concertDiv { flex:1; overflow-y:auto; display:flex; flex-direction:column; }

.card-label {
  font-family:'Syne', sans-serif; font-size:11px; font-weight:700;
  letter-spacing:1.5px; text-transform:uppercase;
  color:rgba(88,62,255,.6); margin-bottom:18px;
}

/* ── Genre bars ── */
.g-row { margin-bottom:14px; }
.g-row:last-child { margin-bottom:0; }
.g-top {
  display:flex; justify-content:space-between; align-items:baseline;
  font-size:13px; font-weight:600; margin-bottom:8px; color:#1a1a2e;
}
.g-top span:last-child {
  font-family:'DM Mono',monospace; font-size:10px;
  font-weight:400; color:rgba(88,62,255,.5);
}
.g-bg { height:8px; background:rgba(88,62,255,.12); border-radius:100px; overflow:hidden; }
.g-fill {
  height:100%; border-radius:100px;
  background:#FF3E8A;
  transition:width 1.4s cubic-bezier(.16,1,.3,1);
}

/* ── Concerts ── */
.city-row { width:100%; display:flex; gap:8px; align-items:center; margin-bottom:14px; }
.city-in {
  background:rgba(88,62,255,.06); border:1px solid rgba(88,62,255,.15);
  border-radius:100px; padding:0 20px; color:#1a1a2e;
  font-family:'Syne',sans-serif; font-size:13px; outline:none;
  width:100%; height:42px; transition:border-color .2s;
}
.city-in:focus { border-color:rgba(88,62,255,.4); }
.city-in::placeholder { color:rgba(88,62,255,.35); }
.c-row {
  display:flex; gap:12px; align-items:flex-start;
  padding:12px 0; border-bottom:1px solid rgba(88,62,255,.08);
}
.c-row:last-child { border:none; padding-bottom:0; }
.c-cal {
  flex-shrink:0; width:44px; text-align:center;
  background:rgba(88,62,255,.07); border:1px solid rgba(88,62,255,.12);
  border-radius:8px; padding:6px 4px;
}
.c-day { font-size:18px; font-weight:800; line-height:1; color:var(--purple); }
.c-mon { font-family:'DM Mono',monospace; font-size:8px; text-transform:uppercase; letter-spacing:1px; color:rgba(88,62,255,.4); }
.c-info { flex:1; }
.c-artist { font-size:13px; font-weight:700; margin-bottom:2px; color:#1a1a2e; }
.c-venue { font-size:11px; color:rgba(26,26,46,.45); margin-bottom:1px; }
.c-city-lbl { font-size:10px; color:rgba(26,26,46,.3); }
.c-tkt {
  flex-shrink:0; align-self:center;
  background:rgba(88,62,255,.08); border:1px solid rgba(88,62,255,.15);
  border-radius:6px; padding:6px 10px; font-size:14px;
  color:var(--purple); text-decoration:none; transition:all .2s;
}
.c-tkt:hover { background:rgba(88,62,255,.15); }
.empty {
  flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:14px; text-align:center; padding:24px;
  font-size:11px; color:rgba(88,62,255,.4); line-height:1.8;
  font-family:'DM Mono',monospace; letter-spacing:.5px;
}

/* ── Music Insights card ── */
@keyframes insightIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:none} }
@keyframes skelShimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

.insights-wrap { display:flex; flex-direction:column; gap:12px; flex:1; justify-content:space-between; }

/* 2×2 grid */
.insights-grid {
  display:grid; grid-template-columns:1fr 1fr; gap:10px;
  animation:insightIn .3s ease both;
}
.insight-cell {
  background:#f6f5ff; border-radius:14px;
  padding:16px; display:flex; flex-direction:column; gap:4px;
  align-self:start; width:100%;
}
.insight-icon {
  width:34px; height:34px; margin-bottom:6px;
  display:flex; align-items:center; justify-content:center;
  background:#fff; border-radius:10px;
  box-shadow:0 1px 4px rgba(88,62,255,.1);
}
.insight-label {
  font-family:'Syne', sans-serif; font-size:10px; font-weight:600;
  letter-spacing:.8px; text-transform:uppercase; color:rgba(88,62,255,.55);
}
.insight-value {
  font-family:'Syne', sans-serif; font-weight:700; font-size:15px;
  color:#1a1a2e; line-height:1.35; margin-top:2px;
}
.insight-sub {
  font-family:'Syne', sans-serif; font-size:13px; font-weight:400;
  color:rgba(26,26,46,.5); line-height:1.4; margin-top:3px;
  display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;
  height:calc(13px * 1.4 * 2);
}

/* micro stats — horizontal row */
.ticket-block {
  background:#f6f5ff; border-radius:12px;
  border:1px solid rgba(88,62,255,.07);
  padding:12px 16px; display:flex; align-items:center; justify-content:space-between; gap:12px;
  animation:insightIn .3s .08s ease both; flex:none;
}

.ticket-icon {
  width:36px; height:36px; border-radius:9px;
  background:#fff; box-shadow:0 1px 4px rgba(88,62,255,.1);
  display:flex; align-items:center; justify-content:center; flex-shrink:0;
}
.ticket-text { display:flex; flex-direction:column; gap:2px; }
.ticket-tier {
  flex-shrink:0; margin-left:auto;
  display:inline-flex; align-items:center; gap:6px;
  padding:7px 12px; border-radius:100px;
  border:1.5px solid currentColor;
}
.ticket-tier-name {
  font-family:'Syne', sans-serif; font-size:10px; font-weight:700;
  letter-spacing:.5px; text-transform:uppercase; line-height:1; white-space:nowrap;
}
.ticket-number {
  font-family:'Syne', sans-serif; font-size:15px; font-weight:700;
  color:#1a1a2e; line-height:1.2; white-space:nowrap;
}
.ticket-label {
  font-family:'Syne', sans-serif; font-size:13px; font-weight:500;
  color:rgba(26,26,46,.45); line-height:1.3;
}



/* skeleton */
.insights-loading { display:flex; flex-direction:column; gap:12px; flex:1; }
.insights-skel {
  border-radius:14px;
  background:linear-gradient(90deg,#f0eeff 25%,#e8e4ff 50%,#f0eeff 75%);
  background-size:200% 100%; animation:skelShimmer 1.4s infinite;
}

/* Concert card match height */
.cards-row {
  display:flex; flex-direction:column; gap:14px; flex:1;
}
.card { flex:1; display:flex; flex-direction:column; }
.card-fill { flex:1; display:flex; flex-direction:column; min-height:0; }

/* ── City autocomplete ── */
.city-ac-wrap { position:relative; flex:1; }
.city-locate-btn {
  flex-shrink:0;
  width:42px; height:42px; min-height:42px;
  background:rgba(88,62,255,.08); border:1px solid rgba(88,62,255,.15);
  border-radius:100px; cursor:pointer; color:rgba(88,62,255,.55);
  display:flex; align-items:center; justify-content:center;
  transition:all .2s;
}
.city-locate-btn:hover { background:rgba(88,62,255,.15); color:var(--purple); }
.city-locate-btn.loading { opacity:0.5; }
.ac-list {
  position:absolute; top:calc(100% + 4px); left:0; right:0;
  background:#fff; border-radius:12px; list-style:none;
  box-shadow:0 8px 32px rgba(88,62,255,.15);
  overflow:hidden; z-index:100; display:none;
  border:1px solid rgba(88,62,255,.1);
  max-height:200px; overflow-y:auto;
}
.ac-list.open { display:block; }
.ac-list li {
  padding:10px 16px; font-family:'Syne',sans-serif;
  font-size:13px; color:#1a1a2e; cursor:pointer;
  transition:background .15s;
  display:flex; align-items:center; gap:8px;
}
.ac-list li:hover, .ac-list li.active { background:rgba(88,62,255,.07); }
.ac-list li span.ac-flag { font-size:16px; }
.ac-list li span.ac-name { flex:1; }
.ac-list li span.ac-country { font-size:11px; color:rgba(88,62,255,.4); font-family:'DM Mono',monospace; }

/* ── Bottom ad bar ── */
.bottom-ad-bar {
  position:fixed; bottom:0; left:0; right:0;
  height:106px;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:4px; background:rgba(10,8,30,.75); backdrop-filter:blur(20px);
  border-top:1px solid rgba(255,249,218,.1);
  z-index:100;
}
.bottom-ad-label {
  font-family:'DM Mono',monospace; font-size:8px; letter-spacing:3px;
  text-transform:uppercase; color:rgba(255,249,218,.25);
}
.bottom-ad-placeholder {
  width:728px; max-width:calc(100% - 32px); height:90px;
  background:rgba(255,249,218,.04); border:1px solid rgba(255,249,218,.08);
  border-radius:4px; display:flex; align-items:center; justify-content:center;
  font-family:'DM Mono',monospace; font-size:10px; letter-spacing:2px;
  color:rgba(255,249,218,.15); text-transform:uppercase;
}

/* ── Mobile ── */
@media (max-width:768px) {
  html, body { overflow:auto; height:auto; }
  #app { height:auto; }
  .layout { flex-direction:column; padding:20px 0 130px; align-items:center; gap:16px; }

  /* Flyer same padding as other elements */
  .flyer-wrap { width:calc(100% - 32px); align-items:center; }
  #flyerCanvas { width:100% !important; height:auto !important; max-width:100%; flex:none; border-radius:12px !important; }

  /* CTAs and cards same width */
  .flyer-btns { width:100%; max-width:100%; }
  .right-panel { max-width:100%; width:calc(100% - 32px); overflow-y:visible; max-height:none; height:auto !important; }
  .insights-card { flex:none !important; height:auto !important; }
  .card { min-height:0; display:flex; flex-direction:column; }
  .insights-wrap { flex:none; }
  .card-fill { flex:1; }

  /* Topbar */
  .topbar { padding:0 16px; height:56px; }
  .topbar-logo { flex:1; }
  .topbar-right { gap:8px; }

  /* Concerts card */
  .card-fill { min-height:280px; }
  .city-row { width:100%; }
}
@media (max-width:480px) {
  .topbar-logo svg { height:24px; }
  .chip-name { display:block; font-size:11px; }
  .btn-logout { display:flex; align-items:center; gap:6px; padding:6px 14px; font-size:11px; gap:5px; }
  .topbar { padding:0 16px; }
  .topbar-right { gap:8px; }
}
</style>

// ── Helper: fit text into a max width ────
function fitText(ctx, text, maxW, maxSize, minSize, fontStr) {
  let size = maxSize;
  ctx.font = fontStr(size);
  while (ctx.measureText(text).width > maxW && size > minSize) {
    size -= 1;
    ctx.font = fontStr(size);
  }
  return size;
}

// ── Helper: draw centered text lines ─────
function drawLines(ctx, lines, x, startY, lineH) {
  lines.forEach((line, i) => {
    ctx.fillText(line, x, startY + i * lineH);
  });
}

// ── Helper: split artists into lines that fit width ──
function splitIntoLines(ctx, names, maxW) {
  const lines = [];
  let current = [];
  names.forEach(name => {
    const test = [...current, name].join(' · ');
    if (ctx.measureText(test).width > maxW && current.length > 0) {
      lines.push(current.join(' · '));
      current = [name];
    } else {
      current.push(name);
    }
  });
  if (current.length) lines.push(current.join(' · '));
  return lines;
}

function makeFestName(firstName) {
  const n = firstName.toLowerCase().replace(/[^a-záéíóúñ]/gi, '');
  if (n.length <= 3) return n.toUpperCase() + 'FEST';
  // Try to find a natural cut: first syllable or first 4 chars
  const vowels = 'aeiouáéíóú';
  let cut = 4;
  // Walk forward until we hit a vowel then stop after it
  for (let i = 2; i < Math.min(n.length - 1, 6); i++) {
    if (vowels.includes(n[i])) { cut = i + 1; break; }
  }
  const prefix = n.slice(0, cut);
  const p = prefix.charAt(0).toUpperCase() + prefix.slice(1).toLowerCase();
  return p + 'Fest';
}
function drawFlyer(artists, userName) {
  const canvas = document.getElementById('flyerCanvas');
  const DPR    = 2;
  canvas.width  = CW * DPR;
  canvas.height = CH * DPR;
  canvas.style.width  = CW + 'px';
  canvas.style.height = CH + 'px';
  const ctx = canvas.getContext('2d');
  ctx.scale(DPR, DPR);
  ctx.clearRect(0, 0, CW, CH);

  if (bgImage) ctx.drawImage(bgImage, 0, 0, CW, CH);
  else { ctx.fillStyle = '#cc0000'; ctx.fillRect(0,0,CW,CH); }

  if (!artists.length) return;

  const CREAM   = bgConfig.textColor;
  const cx      = CW / 2;
  const pad     = CW * 0.055;
  const maxW    = CW - pad * 2;
  const GAP     = 4;    // between lines within a day
  const DAY_GAP = 32;   // between day 1 and day 2
  const FONT    = 'Barlow Condensed, sans-serif';

  const fit = (text, mW, maxSize, fontStr) => {
    let s = maxSize;
    ctx.font = fontStr.replace('?', s);
    while (ctx.measureText(text).width > mW && s > 8) { s--; ctx.font = fontStr.replace('?', s); }
    return s;
  };

  ctx.textAlign    = 'center';
  ctx.textBaseline = 'top';
  ctx.letterSpacing = '-0.5px';

  // ── FESTIVAL NAME ─────────────────────────
  const festName  = makeFestName(userName.split(' ')[0]);
  const titleY    = CH * 0.07;  // more top padding
  const titleSize = fit(festName, maxW, 82, `?px Recollect, AaltoDisplay, Anton, sans-serif`);
  ctx.font        = `${titleSize}px Recollect, AaltoDisplay, Anton, sans-serif`;
  ctx.fillStyle   = CREAM;
  ctx.shadowBlur = 0;
  ctx.fillText(festName, cx, titleY);
  ctx.shadowBlur  = 0;

  // ── PILL ──────────────────────────────────
  ctx.letterSpacing = '0px';
  const pillText  = isPageEs ? 'Crea el tuyo en www.lineapp.club' : isPagePt ? 'Crie o seu em www.lineapp.club' : 'Create yours at www.lineapp.club';
  const pillFontS = 15;
  ctx.font        = `600 ${pillFontS}px ${FONT}`;
  const pillTW    = ctx.measureText(pillText).width;
  const pillPadX  = 18, pillPadY = 7;
  const pillW     = pillTW + pillPadX * 2;
  const pillH     = pillFontS + pillPadY * 2;
  const pillY     = titleY + titleSize + 4;
  const pillX     = cx - pillW / 2;

  ctx.beginPath();
  ctx.roundRect(pillX, pillY, pillW, pillH, pillH / 2);
  ctx.fillStyle = bgConfig.pillBg; ctx.fill();
  ctx.fillStyle = bgConfig.pillText;
  ctx.textBaseline = 'middle';
  ctx.fillText(pillText, cx, pillY + pillH / 2);
  ctx.textBaseline = 'top';
  ctx.letterSpacing = '-0.5px';

  // ── ARTISTS ───────────────────────────────
  const topArtists = artists.slice(0, 18);
  const half = Math.ceil(topArtists.length / 2);
  const day1 = topArtists.slice(0, half);
  const day2 = topArtists.slice(half);

  // Headliner: Aalto Display — fit to width but cap at 64px
  const h1text = day1[0]?.name.toUpperCase() || '';
  const h2text = day2[0]?.name.toUpperCase() || '';
  // Fixed sizes — consistent across all time ranges
  const headSize    = 64;   // headliner
  const nonHeadSize = 18;   // tier 2 & 3

  // Build secondary lines (tier2 + tier3) capped at 4 lines total per day
  const MAX_SEC_LINES = 4;
  const buildSecLines = (day) => {
    ctx.font = `700 ${nonHeadSize}px ${FONT}`;
    const allNames = day.slice(1).map(a => a.name.toUpperCase());
    const lines = [];
    let current = [];
    for (const name of allNames) {
      if (lines.length >= MAX_SEC_LINES) break;
      const test = [...current, name].join(' - ');
      if (current.length > 0 && ctx.measureText(test).width > maxW) {
        lines.push(current.join(' - '));
        current = [name];
      } else {
        current.push(name);
      }
    }
    if (current.length && lines.length < MAX_SEC_LINES) lines.push(current.join(' - '));
    return lines;
  };
  const secLines1 = buildSecLines(day1);
  const secLines2 = buildSecLines(day2);

  const dayHeight = (secLines) => {
    let h = headSize + 8;
    h += (nonHeadSize + GAP) * secLines.length;
    return h;
  };

  const drawDay = (dayArtists, secLines, startY) => {
    let y = startY;
  
    ctx.font = `${headSize}px AaltoDisplay, Anton, sans-serif`;
    ctx.fillStyle = CREAM; ctx.shadowBlur = 12;
    ctx.fillText(dayArtists[0]?.name.toUpperCase() || '', cx, y);
    y += headSize + 8;

    if (secLines.length) {
      ctx.font = `700 ${nonHeadSize}px ${FONT}`;
      ctx.fillStyle = CREAM; ctx.shadowBlur = 6;
      secLines.forEach(line => { ctx.fillText(line, cx, y); y += nonHeadSize + GAP; });
    }


    return y - GAP;
  };

  // Center lineup vertically between pill and raccoon
  const areaTop    = pillY + pillH + CH * 0.13;
  const areaBottom = CH * 0.63;
  const totalH     = dayHeight(secLines1) + DAY_GAP + dayHeight(secLines2);
  const lineupY    = areaTop + (areaBottom - areaTop - totalH) / 2;

  const day1End = drawDay(day1, secLines1, lineupY);
  drawDay(day2, secLines2, day1End + DAY_GAP);

  // ── Watermark ────────────────────────────
  ctx.textAlign    = 'right';
  ctx.textBaseline = 'bottom';
  ctx.font         = `400 10px ${FONT}`;
  ctx.fillStyle    = `rgba(${bgConfig.textColor === '#30373A' ? '48,55,58' : '255,248,231'},${bgConfig.watermarkAlpha})`;
  ctx.fillText(`♪ ${userName} · lineapp.club`, CW - 12, CH - 10);
}

async function detectLocation() {
  if (!navigator.geolocation) {
    alert('Tu navegador no soporta geolocalización');
    return;
  }
  const btn = document.getElementById('locateBtn');
  const input = document.getElementById('cityIn');
  btn.classList.add('loading');
  input.placeholder = 'Detectando ubicación...';

  navigator.geolocation.getCurrentPosition(
    async ({ coords }) => {
      try {
        // Free reverse geocoding with nominatim
        const r = await fetch(
          `https://nominatim.openstreetmap.org/reverse?lat=${coords.latitude}&lon=${coords.longitude}&format=json`,
          { headers: { 'Accept-Language': 'es' } }
        );
        const data = await r.json();
        const city = data.address?.city
          || data.address?.town
          || data.address?.village
          || data.address?.county
          || '';
        if (city) {
          input.value = city;

function acFilter(val) {
  const list = document.getElementById('acList');
  if (!val || val.length < 2) { list.classList.remove('open'); return; }
  const q = val.toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'');
  const matches = CITIES.filter(c => {
    const n = c.name.toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'');
    return n.startsWith(q);
  }).slice(0, 6);
  if (!matches.length) { list.classList.remove('open'); return; }
  acIndex = -1;
  list.innerHTML = matches.map((c,i) => `
    <li onclick="acSelect('${c.name}')">
      <span class="ac-flag">${c.flag}</span>
      <span class="ac-name">${c.name}</span>
      <span class="ac-country">${c.country}</span>
    </li>`).join('');
  list.classList.add('open');
}

function acSelect(name) {
  const input = document.getElementById('cityIn');
  const list  = document.getElementById('acList');
  input.value = name;
  list.classList.remove('open');
  fetchConcerts(name);
}

function acKey(e) {
  const list  = document.getElementById('acList');
  const items = list.querySelectorAll('li');
  if (!list.classList.contains('open')) {
    if (e.key === 'Enter') fetchConcerts(e.target.value.trim());
    return;
  }
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    acIndex = Math.min(acIndex + 1, items.length - 1);
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    acIndex = Math.max(acIndex - 1, -1);
  } else if (e.key === 'Enter') {
    e.preventDefault();
    if (acIndex >= 0) items[acIndex].click();
    else { list.classList.remove('open'); fetchConcerts(e.target.value.trim()); }
    return;
  } else if (e.key === 'Escape') {
    list.classList.remove('open'); return;
  }
  items.forEach((el,i) => el.classList.toggle('active', i === acIndex));
}

function insightsComputeLocal(artistList) {
  // Compute local stats from artist genres
  const genreCounts = {};
  artistList.forEach(a => (a.genres||[]).forEach(g => { genreCounts[g] = (genreCounts[g]||0)+1; }));
  const genres = Object.keys(genreCounts);
  const uniqueGenres = genres.length;

  // Mainstream score: check for big mainstream artists
  const mainstream = ['bad bunny','j balvin','maluma','taylor swift','drake','the weeknd','ed sheeran','harry styles','billie eilish','dua lipa'];
  const alternative = ['radiohead','arctic monkeys','tame impala','bon iver','beach house','phoebe bridgers','sufjan stevens','mitski'];
  const heavy = ['metallica','slipknot','system of a down','bring me the horizon','tool','darkest hour','august burns red'];

  const names = artistList.map(a => a.name.toLowerCase());
  const mainstreamCount = names.filter(n => mainstream.some(m => n.includes(m))).length;
  const altCount = names.filter(n => alternative.some(m => n.includes(m))).length;
  const heavyCount = names.filter(n => heavy.some(m => n.includes(m))).length;

  const chaosScore = Math.min(100, uniqueGenres * 8 + (mainstreamCount > 0 && heavyCount > 0 ? 30 : 0) + (altCount > 0 && mainstreamCount > 0 ? 20 : 0));
  const rarityScore = Math.min(100, 100 - (mainstreamCount * 8) + (altCount * 6) + (heavyCount * 4));
  const diversityCount = Math.min(uniqueGenres, 12);

  return { chaosScore, rarityScore, diversityCount, mainstreamCount, heavyCount, altCount, uniqueGenres };
}

async function fetchConcerts(city) {
  if (!city) return;
  const el = document.getElementById('concertDiv');
  el.innerHTML = '<div class="empty">Buscando conciertos...</div>';
  try {
    const names = artists.slice(0,10).map(a=>a.name).join(',');
    const r = await fetch(`/api/concerts?artists=${encodeURIComponent(names)}&city=${encodeURIComponent(city)}`);
    const data = await r.json();
    if (!data.length) { el.innerHTML = `<div class="empty">Sin conciertos en <strong>${city}</strong> próximamente</div>`; return; }
    el.innerHTML = data.map(c => {
      const d = new Date(c.date);
      return `<div class="c-row">
        <div class="c-cal"><div class="c-day">${d.getDate()}</div><div class="c-mon">${d.toLocaleString('es',{month:'short'}).toUpperCase()}</div></div>
        <div class="c-info"><div class="c-artist">${c.artist}</div><div class="c-venue">${c.venue}</div><div class="c-city-lbl">${c.city}</div></div>
        ${c.url?`<a href="${c.url}" target="_blank" class="c-tkt">🎟</a>`:''}
      </div>`;
    }).join('');
  } catch { el.innerHTML = '<div class="empty">Error al buscar conciertos</div>'; }
}
